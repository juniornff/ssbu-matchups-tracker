name: Deploy to Server

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/Applications/ssbu_matchups

            # Si no existe docker-compose.yml, usar el de producción
            if [ ! -f docker-compose.yml ]; then
              cp docker-compose.prod.yml docker-compose.yml
            fi

            # Descargar la última imagen
            docker pull ghcr.io/juniornff/ssbu-matchups-tracker:latest

            # Detener contenedor anterior (si existe)
            docker compose down || true

            # Levantar nuevo contenedor
            docker compose up -d

            # Esperar unos segundos y verificar que el contenedor está corriendo
            sleep 5
            if [ -z "$(docker compose ps -q)" ]; then
              echo "Error: el contenedor no se inició correctamente"
              exit 1
            fi

            # Eliminar la imagen anterior si existe y es diferente
            OLD_IMAGE=$(docker images --filter=reference='ghcr.io/juniornff/ssbu-matchups-tracker:latest' --format '{{.ID}}' | tail -n +2 | head -1)
            if [ -n "$OLD_IMAGE" ]; then
              docker rmi "$OLD_IMAGE" || true
            fi