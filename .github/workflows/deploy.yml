name: Deploy to Server

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ~/Applications/ssbu_matchups

            # URL base del repositorio raw
            REPO_URL="https://raw.githubusercontent.com/juniornff/ssbu-matchups-tracker/main"

            # 1. Verificar si docker-compose.yml existe localmente
            if [ ! -f docker-compose.yml ]; then
              echo "docker-compose.yml no encontrado, descargando..."
              wget -q -O docker-compose.yml "$REPO_URL/docker-compose.yml" || { echo "Error al descargar docker-compose.yml"; exit 1; }
            else
              echo "docker-compose.yml existe localmente."
            fi

            # 2. Detener el contenedor actual (con el archivo actual)
            docker compose down || true

            # 3. Actualizar docker-compose.yml con la nueva versión del repositorio
            echo "Actualizando docker-compose.yml desde el repositorio..."
            wget -q -O docker-compose.yml "$REPO_URL/docker-compose.yml" || { echo "Error al descargar docker-compose.yml"; exit 1; }

            # 4. Descargar la última version de las imagenes
            docker pull ghcr.io/juniornff/ssbu-matchups-tracker:latest
            docker pull ghcr.io/juniornff/brackets-manager-server:latest

            # 5. Levantar los nuevos contenedores
            docker compose up -d

            # 6. Verificar que los contenedores estén corriendo
            sleep 5
            if [ -z "$(docker compose ps -q)" ]; then
              echo "Error: el contenedor no se inició correctamente"
              exit 1
            fi

            # 7. Eliminar las imágenes anteriores
            # App
            OLD_APP_IMAGE=$(docker images --filter=reference='ghcr.io/juniornff/ssbu-matchups-tracker:latest' --format '{{.ID}}' | tail -n +2 | head -1)
            if [ -n "$OLD_APP_IMAGE" ]; then
              docker rmi "$OLD_APP_IMAGE" || true
            fi
            # Tournament server
            OLD_TOURNAMENT_IMAGE=$(docker images --filter=reference='ghcr.io/juniornff/brackets-manager-server:latest' --format '{{.ID}}' | tail -n +2 | head -1)
            if [ -n "$OLD_TOURNAMENT_IMAGE" ]; then
              docker rmi "$OLD_TOURNAMENT_IMAGE" || true
            fi