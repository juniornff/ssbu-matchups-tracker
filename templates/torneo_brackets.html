{% extends 'base.html' %}

{% block content %}
<h2>Bracket del Torneo: {{ torneo.nombre }}</h2>
<p class="text-muted">Evento: {{ torneo.evento.fecha }}</p>
<hr>

<!-- Botón Volver a Torneos -->
<div class="mb-3">
    <a href="{{ url_for('gestion_torneos', evento_id=torneo.evento_id) }}" class="btn btn-secondary">⬅️ Volver a Torneos</a>
</div>

{% if current_matches and current_matches|length > 0 %}
<div class="card mb-4">
    <div class="card-header bg-info text-white">
        <h5 class="mb-0">Enfrentamientos actuales</h5>
    </div>
    <div class="card-body">
        <ul class="list-group" id="currentMatchesList">
            <!-- Se llenará con JavaScript -->
        </ul>
    </div>
</div>
{% endif %}

<!-- Contenedor donde se renderizará el bracket -->
<div class="brackets-viewer" id="bracketsViewer"></div>

<!-- Incluir CSS y JS de brackets-viewer -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/brackets-viewer@latest/dist/brackets-viewer.min.css" />
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/brackets-viewer@latest/dist/brackets-viewer.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Datos recibidos desde el backend (en formato JSON)
        const stageData = {{ stage_data|tojson }};
        const currentMatches = {{ current_matches|tojson }};

        // Crear un mapa de participantes: id -> nombre
        const participantMap = {};
        if (stageData && stageData.participant) {
            stageData.participant.forEach(p => {
                participantMap[p.id] = p.name;
            });
        }

        // Mostrar enfrentamientos actuales si hay
        if (currentMatches && currentMatches.length > 0) {
            const list = document.getElementById('currentMatchesList');
            list.innerHTML = '';
            currentMatches.forEach(match => {
                const opp1Id = match.opponent1 ? match.opponent1.id : null;
                const opp2Id = match.opponent2 ? match.opponent2.id : null;
                const name1 = opp1Id !== null ? (participantMap[opp1Id] || 'Desconocido') : 'BYE';
                const name2 = opp2Id !== null ? (participantMap[opp2Id] || 'Desconocido') : 'BYE';
                const li = document.createElement('li');
                li.className = 'list-group-item';
                li.textContent = `${name1} vs ${name2}`;
                list.appendChild(li);
            });
        }

        // Renderizar bracket
        if (stageData && stageData.stage && stageData.match && stageData.match_game && stageData.participant) {
            window.bracketsViewer.render({
                stages: stageData.stage,
                matches: stageData.match,
                matchGames: stageData.match_game,
                participants: stageData.participant
            });
        } else {
            console.error('Los datos del torneo no tienen la estructura esperada:', stageData);
            document.getElementById('bracketsViewer').innerHTML = '<div class="alert alert-danger">Error: Los datos del torneo no son válidos para mostrar el bracket.</div>';
        }
    });
</script>
{% endblock %}
